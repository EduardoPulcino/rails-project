services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: buffet
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_development
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U buffet -d app_development']
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build: .
    stdin_open: true
    tty: true
    entrypoint: ['bash', 'config/setup_app.sh']
    command: bash -c "bundle exec rails s -p 3000 -b '0.0.0.0'"
    env_file:
      - ./.env.development
    volumes:
      - .:/home/app/web
      - bundle_cache:/usr/local/bundle
      - node_modules:/home/app/web/node_modules
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    entrypoint: ['bash', 'config/setup_app.sh']
    command: bundle exec sidekiq -c 1
    env_file:
      - ./.env.development
    volumes:
      - .:/home/app/web
      - bundle_cache:/usr/local/bundle
      - node_modules:/home/app/web/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  bundle_cache:
  node_modules:
  postgres_data:
